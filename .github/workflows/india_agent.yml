name: India Swing Trading Agent

on:
  schedule:
    - cron: '45 2 * * 1-5'    # 8:15 AM IST — 1hr before open
    - cron: '45 4 * * 1-5'    # 10:15 AM IST
    - cron: '45 6 * * 1-5'    # 12:15 PM IST
    - cron: '45 8 * * 1-5'    # 2:15 PM IST
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 115
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run India trading agent
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python india_swing_agent.py
